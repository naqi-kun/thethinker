stages:
  - lint
  - test
  - version
  - build
  - deploy
  - release

variables:
  NODE_VERSION: "22.16.0"
  GO_VERSION: "1.25"

# TEMP: run CD jobs on test-new-deploy to validate before merge to main.
# Remove test-new-deploy from these anchors after validation.
.rules-cd-branch:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "test-new-deploy"

.rules-cd-branch-manual:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "test-new-deploy"
      when: manual

# TEMP: on test-new-deploy skip lint/test/build for faster deploy iteration.
# Remove this anchor (and extends) once CD is validated.
.rules-not-cd-test-branch:
  rules:
    - if: $CI_COMMIT_BRANCH == "test-new-deploy"
      when: never
    - when: on_success

# TEMP: tag + release jobs only on main until staging deploy is stable.
.rules-cd-main-only:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Frontend ────────────────────────────────────────────────

frontend-schema-sync:
  extends: .rules-not-cd-test-branch
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - apk add --no-cache git
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run gen:api
    - git diff --exit-code src/shared/api/schema.d.ts

frontend-lint:
  extends: .rules-not-cd-test-branch
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run lint
    - npm run format:check

frontend-test:
  extends: .rules-not-cd-test-branch
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run test -- --run --passWithNoTests

frontend-build:
  extends: .rules-not-cd-test-branch
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run build

# ── Backend ─────────────────────────────────────────────────

backend-lint:
  extends: .rules-not-cd-test-branch
  stage: lint
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && go vet ./...
    # TODO: add golangci-lint when linter config is settled

backend-test:
  extends: .rules-not-cd-test-branch
  stage: test
  image: golang:${GO_VERSION}-alpine
  variables:
    # Minimum module-wide statement coverage. Raise this as more tests land —
    # never lower it. Measured baseline at introduction (KAN-33): ~10%.
    COVERAGE_THRESHOLD: "10"
  script:
    - cd backend
    - go test -coverpkg=./... -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
    - |
      total=$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')
      echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
      awk -v got="$total" -v thr="$COVERAGE_THRESHOLD" 'BEGIN {
        if (got+0 < thr+0) {
          printf "FAIL: coverage %.1f%% is below threshold %s%%\n", got, thr
          exit 1
        }
        printf "OK: coverage %.1f%% meets threshold %s%%\n", got, thr
      }'
  coverage: '/^total:\s+\(statements\)\s+\d+\.\d+%/'

backend-build:
  extends: .rules-not-cd-test-branch
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/api
  artifacts:
    paths:
      - backend/server
    expire_in: 1 hour

# ── Version (main / test-new-deploy) ────────────────────────

bump-version:
  stage: version
  image: node:${NODE_VERSION}-alpine
  resource_group: release
  extends: .rules-cd-branch
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
  script:
    - node scripts/bump-version.mjs --output release.env
  artifacts:
    reports:
      dotenv: release.env

# ── Deploy ──────────────────────────────────────────────────
# Requires GitLab CI/CD variable:
#   GCS_KEY_JSON  (type: File) — GCP service account JSON for deploy jobs.
#
# Main-branch CD (staging auto, production manual):
#   bump-version → build-images → deploy-staging → tag-version → deploy-production → release-production
#
# Legacy tag deploy (deploy-gcp) kept until new flow is proven. Semver v*.*.* tags
# from CD are excluded so they do not double-deploy production.

.gcp-deploy-setup:
  image: google/cloud-sdk:slim
  before_script:
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - npm ci
    - curl -sSL https://aspire.dev/install.sh | bash
    - export PATH="$HOME/.aspire/bin:$PATH"
    - apt-get install -y google-cloud-cli-run-compose libicu-dev
    - gcloud auth activate-service-account --key-file="$GCS_KEY_JSON"
    - gcloud config set project thethinker
    - gcloud config set run/region us-central1
    - gcloud config set disable_prompts true

build-images:
  extends:
    - .gcp-deploy-setup
    - .rules-cd-branch
  stage: build
  needs: [bump-version]
  script:
    - |
      export GOOGLECLIENTID="${GOOGLE_CLIENT_ID:-176526137598-8hme48480tc0gajdttlrpv9qu4g9c7a7.apps.googleusercontent.com}"
      gcloud builds submit \
        --config cloudbuild.yaml \
        --substitutions="_TAG=${RELEASE_VERSION},_VITE_GOOGLE_CLIENT_ID=${GOOGLECLIENTID}" \
        .

deploy-staging:
  extends:
    - .gcp-deploy-setup
    - .rules-cd-branch
  stage: deploy
  needs: [bump-version, build-images]
  environment:
    name: staging
  variables:
    COMPOSE_SERVICE_NAME: thethinker-staging
    CLOUD_SQL_INSTANCE: thethinker:us-central1:thethinker-staging-db
    GCS_BUCKET: thethinker-staging-wardrobe-images
    SKIP_BUILD: "true"
    SKIP_DRY_RUN: "true"
  script:
    - ./scripts/deploy-cloud-run.sh

tag-version:
  stage: deploy
  extends: .rules-cd-main-only
  image: alpine:3.20
  needs: [deploy-staging, bump-version]
  resource_group: release
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
    - git config user.email "ci@gitlab.com"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - |
      if git rev-parse -q --verify "refs/tags/v${RELEASE_VERSION}" >/dev/null; then
        echo "Tag v${RELEASE_VERSION} already exists — skipping push"
        exit 0
      fi
      git tag "v${RELEASE_VERSION}" "${CI_COMMIT_SHA}"
      git push origin "v${RELEASE_VERSION}"

deploy-production:
  extends:
    - .gcp-deploy-setup
    - .rules-cd-branch-manual
  stage: deploy
  needs: [deploy-staging, bump-version, build-images]
  environment:
    name: production
  variables:
    COMPOSE_SERVICE_NAME: thethinker
    CLOUD_SQL_INSTANCE: thethinker:us-central1:thethinker-db
    GCS_BUCKET: thethinker-wardrobe-images
    SKIP_BUILD: "true"
    SKIP_DRY_RUN: "false"
  script:
    - ./scripts/deploy-cloud-run.sh

release-production:
  stage: release
  extends: .rules-cd-main-only
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [deploy-production, bump-version]
  script:
    - echo "Creating GitLab release v${RELEASE_VERSION}"
  release:
    tag_name: v$RELEASE_VERSION
    name: "v$RELEASE_VERSION"
    description: "Production release for commit ${CI_COMMIT_SHA}. Pipeline ${CI_PIPELINE_URL}."

deploy-gcp:
  stage: deploy
  image: google/cloud-sdk:slim
  # Tag-gated auto-deploy: only runs on tag pipelines (`only: tags` below).
  # Pushing a tag is the intentional release trigger; no manual Play step.
  # allow_failure stays on so a failed deploy does not block the tag pipeline
  # while we are still validating the new AppHost path.
  #
  # Deploy is AppHost publish → validate → remote build → dry-run → compose up:
  #   1. Aspire generates the production Compose artifact from apphost.mts.
  #   2. The non-mutating validator proves the artifact has the Cloud Run topology
  #      we expect before any mutating deploy command runs.
  #   3. cloudbuild.yaml builds + pushes images tagged with $CI_COMMIT_TAG.
  #   4. gcloud run compose up --dry-run validates provider translation with
  #      the same public-access flag as the real deploy.
  #   5. gcloud run compose up --no-build deploys only those prebuilt images
  #      and allows unauthenticated access for the public frontend.
  #
  # NOTE: the deploy SA (thethinker-backend@) needs roles/cloudbuild.builds.editor
  # and Artifact Registry write to run step 1. If the build submit 403s, grant those.
  #
  allow_failure: true
  extends: .gcp-deploy-setup
  script:
    - |
      test -n "$CI_COMMIT_TAG" || { echo "deploy-gcp only runs for Git tags"; exit 1; }

      export REGISTRY="us-central1-docker.pkg.dev/thethinker/cloud-run-source-deploy"
      export AI_IMAGE="${REGISTRY}/thethinker-ai:${CI_COMMIT_TAG}"
      export BACKEND_IMAGE="${REGISTRY}/thethinker-backend:${CI_COMMIT_TAG}"
      export FRONTEND_IMAGE="${REGISTRY}/thethinker-frontend:${CI_COMMIT_TAG}"

      export ANTHROPICAPIKEY="${ANTHROPICAPIKEY:-$ANTHROPIC_API_KEY}"
      export JWTSECRET="${JWTSECRET:-$JWT_SECRET}"
      export WEATHERAPIKEY="${WEATHERAPIKEY:-$WEATHER_API_KEY}"
      export DATABASEURL="${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD}@127.0.0.1:5432/thethinker}"
      export CLOUDSQLINSTANCE="${CLOUD_SQL_INSTANCE:-thethinker:us-central1:thethinker-db}"
      export GCSBUCKET="${GCS_BUCKET:-thethinker-wardrobe-images}"
      export GOOGLECLIENTID="${GOOGLE_CLIENT_ID:-176526137598-8hme48480tc0gajdttlrpv9qu4g9c7a7.apps.googleusercontent.com}"
      export GOOGLECLIENTSECRET="${GOOGLE_CLIENT_SECRET:-$GOOGLECLIENTSECRET}"

      : "${ANTHROPICAPIKEY:?ANTHROPICAPIKEY or ANTHROPIC_API_KEY is required}"
      : "${JWTSECRET:?JWTSECRET or JWT_SECRET is required}"
      : "${WEATHERAPIKEY:?WEATHERAPIKEY or WEATHER_API_KEY is required}"
      : "${GOOGLECLIENTSECRET:?GOOGLE_CLIENT_SECRET is required}"

      export Parameters__databaseUrl="$DATABASEURL"
      export Parameters__gcsBucket="$GCSBUCKET"
      export Parameters__googleClientId="$GOOGLECLIENTID"
      export Parameters__googleClientSecret="$GOOGLECLIENTSECRET"
      export Parameters__jwtSecret="$JWTSECRET"
      export Parameters__anthropicApiKey="$ANTHROPICAPIKEY"
      export Parameters__weatherApiKey="$WEATHERAPIKEY"
      export Parameters__cloudSqlInstance="$CLOUDSQLINSTANCE"

      rm -rf aspire-output
      aspire publish -o ./aspire-output --environment production --non-interactive
      npm run validate:production-compose -- ./aspire-output/docker-compose.yaml --image-tag "$CI_COMMIT_TAG"

      gcloud builds submit \
        --config cloudbuild.yaml \
        --substitutions=_TAG="$CI_COMMIT_TAG",_VITE_GOOGLE_CLIENT_ID="$GOOGLECLIENTID" \
        .

      for image in "$AI_IMAGE" "$BACKEND_IMAGE" "$FRONTEND_IMAGE"; do
        gcloud artifacts docker images describe "$image"
      done

      gcloud run compose up ./aspire-output/docker-compose.yaml \
        --dry-run \
        --no-build \
        --allow-unauthenticated \
        --region us-central1 \
        --project thethinker

      gcloud run compose up ./aspire-output/docker-compose.yaml \
        --no-build \
        --allow-unauthenticated \
        --region us-central1 \
        --project thethinker
  rules:
    # Legacy manual tag deploys (e.g. deploy-test-*). Skip semver tags created by CD.
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: never
    - if: $CI_COMMIT_TAG
