stages:
  - lint
  - test
  - build
  - docker

variables:
  NODE_VERSION: "22.16.0"
  GO_VERSION: "1.25"
  IMAGE_NAME: $CI_REGISTRY_IMAGE

# ── Frontend ────────────────────────────────────────────────

frontend-schema-sync:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - apk add --no-cache git
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run gen:api
    - git diff --exit-code src/shared/api/schema.d.ts

frontend-lint:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run lint
    - npm run format:check

frontend-test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run test -- --run

frontend-build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run build

# ── Backend ─────────────────────────────────────────────────

backend-lint:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && go vet ./...
    # TODO: add golangci-lint when linter config is settled

backend-test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  variables:
    # Minimum module-wide statement coverage. Raise this as more tests land —
    # never lower it. Measured baseline at introduction (KAN-33): ~10%.
    COVERAGE_THRESHOLD: "10"
  script:
    - cd backend
    - go test -coverpkg=./... -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
    - |
      total=$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')
      echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
      awk -v got="$total" -v thr="$COVERAGE_THRESHOLD" 'BEGIN {
        if (got+0 < thr+0) {
          printf "FAIL: coverage %.1f%% is below threshold %s%%\n", got, thr
          exit 1
        }
        printf "OK: coverage %.1f%% meets threshold %s%%\n", got, thr
      }'
  coverage: '/^total:\s+\(statements\)\s+\d+\.\d+%/'

backend-build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/api
  artifacts:
    paths:
      - backend/server
    expire_in: 1 hour

docker-build:
  stage: docker
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA -t $IMAGE_NAME:latest backend/
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME:latest
  only:
    - main
