stages:
  - lint
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "22.16.0"
  GO_VERSION: "1.25"

# ── Frontend ────────────────────────────────────────────────

frontend-schema-sync:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - apk add --no-cache git
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run gen:api
    - git diff --exit-code src/shared/api/schema.d.ts

frontend-lint:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run lint
    - npm run format:check

frontend-test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run test -- --run --passWithNoTests

frontend-build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run build

# ── Backend ─────────────────────────────────────────────────

backend-lint:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && go vet ./...
    # TODO: add golangci-lint when linter config is settled

backend-test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  variables:
    # Minimum module-wide statement coverage. Raise this as more tests land —
    # never lower it. Measured baseline at introduction (KAN-33): ~10%.
    COVERAGE_THRESHOLD: "10"
  script:
    - cd backend
    - go test -coverpkg=./... -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
    - |
      total=$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')
      echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
      awk -v got="$total" -v thr="$COVERAGE_THRESHOLD" 'BEGIN {
        if (got+0 < thr+0) {
          printf "FAIL: coverage %.1f%% is below threshold %s%%\n", got, thr
          exit 1
        }
        printf "OK: coverage %.1f%% meets threshold %s%%\n", got, thr
      }'
  coverage: '/^total:\s+\(statements\)\s+\d+\.\d+%/'

backend-build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/api
  artifacts:
    paths:
      - backend/server
    expire_in: 1 hour

# ── Deploy ──────────────────────────────────────────────────
# Requires one GitLab CI/CD variable:
#   GCS_KEY_JSON  (type: File) — the GCP service account JSON key.
#                 The service account needs Cloud Run Admin + Storage Object Admin.

deploy-gcp:
  stage: deploy
  image: google/cloud-sdk:slim
  # TEMPORARILY NON-BLOCKING (KAN-134): kept manual + allow_failure so a red deploy
  # never blocks `main` and we don't pile up junk failed revisions on every merge.
  # The running prod revision is unaffected by a failed deploy.
  #
  # Root cause of the health-check failures (confirmed from the revision logs of
  # thethinker-00022-5vs): the deployed frontend image was a STALE pre-migration
  # build whose nginx template still referenced ${RAILWAY_SERVICE_BACKEND_URL}
  # (unset on Cloud Run) → `proxy_pass http:///;` → nginx aborts with "no host in
  # upstream" → ingress never binds :8080. compose up was reusing the existing
  # `:latest` registry image instead of building current source. The IMAGE_TAG
  # change below (per-commit tags) forces a fresh build and fixes this. The `ai`
  # sidecar started cleanly in those logs — its 512Mi→2Gi bump (deploy-production.mjs)
  # is a separate runtime-load concern, not the deploy blocker.
  #
  # Once a manual deploy is confirmed green, revert both keys below for auto-deploy.
  when: manual
  allow_failure: true
  before_script:
    # Install Node 22 on the gcloud image
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    # The slim image has the gcloud component manager disabled, so `gcloud run
    # compose up` is unavailable until its apt package is installed.
    - apt-get install -y google-cloud-cli-run-compose
    # Authenticate gcloud with the service account key
    - gcloud auth activate-service-account --key-file="$GCS_KEY_JSON"
    - gcloud config set project thethinker
    - gcloud config set run/region us-central1
    - gcloud config set disable_prompts true
  script:
    # 1. Materialise the .env that prepare-gcloud-compose.mjs substitutes into
    #    compose.yaml (these reach the ai/backend containers; prod-only overrides
    #    like DATABASE_URL are applied later by deploy-production.mjs).
    #    IMAGE_TAG pins the image tags to this commit so `gcloud run compose up`
    #    rebuilds from source every deploy. With a mutable `:latest`, compose up
    #    reuses the existing registry image and silently skips the build — which
    #    once shipped a stale pre-migration frontend whose nginx still referenced
    #    ${RAILWAY_SERVICE_BACKEND_URL} and crashed on startup.
    - |
      printf 'DB_PASSWORD=%s\nANTHROPICAPIKEY=%s\nJWTSECRET=%s\nWEATHERAPIKEY=%s\nIMAGE_TAG=%s\n' \
        "$DB_PASSWORD" "$ANTHROPICAPIKEY" "$JWTSECRET" "$WEATHERAPIKEY" "$CI_COMMIT_SHORT_SHA" > .env
    - node scripts/prepare-gcloud-compose.mjs
    # 2. Build + push images and deploy a revision from compose. The frontend image
    #    is baked with VITE_GOOGLE_CLIENT_ID (compose build.args) so Google sign-in
    #    is enabled in production.
    - gcloud run compose up
    # 3. Productionise the revision: swap the local Postgres container for the Cloud
    #    SQL proxy and inject prod env (Cloud SQL DATABASE_URL, GCS creds, and the
    #    Google client id/secret). GOOGLE_CLIENT_SECRET comes from a CI variable.
    - cp "$GCS_KEY_JSON" gcs-key.json
    - node scripts/deploy-production.mjs
  only:
    - main
