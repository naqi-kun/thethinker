stages:
  - lint
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "22.16.0"
  GO_VERSION: "1.25"

# ── Frontend ────────────────────────────────────────────────

frontend-schema-sync:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - apk add --no-cache git
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run gen:api
    - git diff --exit-code src/shared/api/schema.d.ts

frontend-lint:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run lint
    - npm run format:check

frontend-test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run test -- --run --passWithNoTests

frontend-build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run build

# ── Backend ─────────────────────────────────────────────────

backend-lint:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && go vet ./...
    # TODO: add golangci-lint when linter config is settled

backend-test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  variables:
    # Minimum module-wide statement coverage. Raise this as more tests land —
    # never lower it. Measured baseline at introduction (KAN-33): ~10%.
    COVERAGE_THRESHOLD: "10"
  script:
    - cd backend
    - go test -coverpkg=./... -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
    - |
      total=$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')
      echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
      awk -v got="$total" -v thr="$COVERAGE_THRESHOLD" 'BEGIN {
        if (got+0 < thr+0) {
          printf "FAIL: coverage %.1f%% is below threshold %s%%\n", got, thr
          exit 1
        }
        printf "OK: coverage %.1f%% meets threshold %s%%\n", got, thr
      }'
  coverage: '/^total:\s+\(statements\)\s+\d+\.\d+%/'

backend-build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/api
  artifacts:
    paths:
      - backend/server
    expire_in: 1 hour

# ── Deploy ──────────────────────────────────────────────────

# Source-build deploys: `railway up` uploads each service directory and Railway
# builds its Dockerfile (pinned via <svc>/railway.json -> builder: DOCKERFILE).
# No image registry is involved, so there is no image tag to mis-point — that
# missing-tag mistake is what took the backend down (cyrileo/...:fix1).
#
# Each <svc>/railway.json also sets a healthcheckPath, so Railway will NOT shift
# traffic to a new deploy until it passes its healthcheck; a broken build leaves
# the previous healthy deploy serving instead of crashing the service.
#
# --detach is intentionally omitted so a failed build/deploy fails the pipeline
# (visible red) instead of passing silently.
deploy-railway:
  stage: deploy
  image: node:22
  before_script:
    # Pin the CLI so an upstream release can't change deploy behavior unannounced.
    - npm install -g @railway/cli@5.12.1
  script:
    - railway up backend  --service backend
    - railway up ai       --service ai
    - railway up frontend --service frontend
  only:
    - main
  variables:
    RAILWAY_TOKEN: $RAILWAY_TOKEN
    RAILWAY_PROJECT_ID: $RAILWAY_PROJECT_ID
