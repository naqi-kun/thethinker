stages:
  - lint
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "22.16.0"
  GO_VERSION: "1.25"

# ── Frontend ────────────────────────────────────────────────

frontend-schema-sync:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - apk add --no-cache git
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run gen:api
    - git diff --exit-code src/shared/api/schema.d.ts

frontend-lint:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run lint
    - npm run format:check

frontend-test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run test -- --run --passWithNoTests

frontend-build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - cd frontend
    - rm -f package-lock.json
    - npm install
    - npm run build

# ── Backend ─────────────────────────────────────────────────

backend-lint:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && go vet ./...
    # TODO: add golangci-lint when linter config is settled

backend-test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  variables:
    # Minimum module-wide statement coverage. Raise this as more tests land —
    # never lower it. Measured baseline at introduction (KAN-33): ~10%.
    COVERAGE_THRESHOLD: "10"
  script:
    - cd backend
    - go test -coverpkg=./... -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out | tail -1
    - |
      total=$(go tool cover -func=coverage.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')
      echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
      awk -v got="$total" -v thr="$COVERAGE_THRESHOLD" 'BEGIN {
        if (got+0 < thr+0) {
          printf "FAIL: coverage %.1f%% is below threshold %s%%\n", got, thr
          exit 1
        }
        printf "OK: coverage %.1f%% meets threshold %s%%\n", got, thr
      }'
  coverage: '/^total:\s+\(statements\)\s+\d+\.\d+%/'

backend-build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - cd backend && CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/api
  artifacts:
    paths:
      - backend/server
    expire_in: 1 hour

# ── Deploy ──────────────────────────────────────────────────
# Requires one GitLab CI/CD variable:
#   GCS_KEY_JSON  (type: File) — the GCP service account JSON key.
#                 The service account needs Cloud Run Admin + Storage Object Admin.

deploy-gcp:
  stage: deploy
  image: google/cloud-sdk:slim
  # Tag-gated auto-deploy: only runs on tag pipelines (`only: tags` below).
  # Pushing a tag is the intentional release trigger; no manual Play step.
  # allow_failure stays on so a failed deploy does not block the tag pipeline
  # while we are still validating the new AppHost path (KAN-134).
  #
  # Deploy is AppHost publish → validate → remote build → dry-run → compose up:
  #   1. Aspire generates the production Compose artifact from apphost.mts.
  #   2. The non-mutating validator proves the artifact has the Cloud Run topology
  #      we expect before any mutating deploy command runs.
  #   3. cloudbuild.yaml builds + pushes images tagged with $CI_COMMIT_TAG.
  #   4. gcloud run compose up --dry-run validates provider translation with
  #      the same public-access flag as the real deploy.
  #   5. gcloud run compose up --no-build deploys only those prebuilt images
  #      and allows unauthenticated access for the public frontend.
  #
  # NOTE: the deploy SA (thethinker-backend@) needs roles/cloudbuild.builds.editor
  # and Artifact Registry write to run step 1. If the build submit 403s, grant those.
  #
  allow_failure: true
  before_script:
    # Install Node 22 on the gcloud image
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - npm ci
    # Install Aspire CLI for AppHost-authored deployment artifacts.
    - curl -sSL https://aspire.dev/install.sh | bash
    - export PATH="$HOME/.aspire/bin:$PATH"
    # The slim image has the gcloud component manager disabled, so `gcloud run
    # compose up` is unavailable until its apt package is installed.
    # Aspire CLI is .NET and needs ICU libs missing from the slim base image.
    - apt-get install -y google-cloud-cli-run-compose libicu-dev
    # Authenticate gcloud with the service account key
    - gcloud auth activate-service-account --key-file="$GCS_KEY_JSON"
    - gcloud config set project thethinker
    - gcloud config set run/region us-central1
    - gcloud config set disable_prompts true
  script:
    - |
      test -n "$CI_COMMIT_TAG" || { echo "deploy-gcp only runs for Git tags"; exit 1; }

      export REGISTRY="us-central1-docker.pkg.dev/thethinker/cloud-run-source-deploy"
      export AI_IMAGE="${REGISTRY}/thethinker-ai:${CI_COMMIT_TAG}"
      export BACKEND_IMAGE="${REGISTRY}/thethinker-backend:${CI_COMMIT_TAG}"
      export FRONTEND_IMAGE="${REGISTRY}/thethinker-frontend:${CI_COMMIT_TAG}"

      export ANTHROPICAPIKEY="${ANTHROPICAPIKEY:-$ANTHROPIC_API_KEY}"
      export JWTSECRET="${JWTSECRET:-$JWT_SECRET}"
      export WEATHERAPIKEY="${WEATHERAPIKEY:-$WEATHER_API_KEY}"
      export DATABASEURL="${DATABASE_URL:-postgresql://postgres:${DB_PASSWORD}@127.0.0.1:5432/thethinker}"
      export CLOUDSQLINSTANCE="${CLOUD_SQL_INSTANCE:-thethinker:us-central1:thethinker-db}"
      export GCSBUCKET="${GCS_BUCKET:-thethinker-wardrobe-images}"
      export GCSCREDENTIALSJSON="$(node -e 'const fs = require("fs"); process.stdout.write(JSON.stringify(JSON.parse(fs.readFileSync(process.env.GCS_KEY_JSON, "utf8"))));')"
      export GOOGLECLIENTID="${GOOGLE_CLIENT_ID:-176526137598-8hme48480tc0gajdttlrpv9qu4g9c7a7.apps.googleusercontent.com}"
      export GOOGLECLIENTSECRET="${GOOGLE_CLIENT_SECRET:-$GOOGLECLIENTSECRET}"

      : "${ANTHROPICAPIKEY:?ANTHROPICAPIKEY or ANTHROPIC_API_KEY is required}"
      : "${JWTSECRET:?JWTSECRET or JWT_SECRET is required}"
      : "${WEATHERAPIKEY:?WEATHERAPIKEY or WEATHER_API_KEY is required}"
      : "${GOOGLECLIENTSECRET:?GOOGLE_CLIENT_SECRET is required}"

      export Parameters__databaseUrl="$DATABASEURL"
      export Parameters__gcsBucket="$GCSBUCKET"
      export Parameters__gcsCredentialsJson="$GCSCREDENTIALSJSON"
      export Parameters__googleClientId="$GOOGLECLIENTID"
      export Parameters__googleClientSecret="$GOOGLECLIENTSECRET"
      export Parameters__jwtSecret="$JWTSECRET"
      export Parameters__anthropicApiKey="$ANTHROPICAPIKEY"
      export Parameters__weatherApiKey="$WEATHERAPIKEY"
      export Parameters__cloudSqlInstance="$CLOUDSQLINSTANCE"

      rm -rf aspire-output
      aspire publish -o ./aspire-output --environment production --non-interactive
      npm run validate:production-compose -- ./aspire-output/docker-compose.yaml --image-tag "$CI_COMMIT_TAG"

      gcloud builds submit \
        --config cloudbuild.yaml \
        --substitutions=_TAG="$CI_COMMIT_TAG",_VITE_GOOGLE_CLIENT_ID="$GOOGLECLIENTID" \
        .

      for image in "$AI_IMAGE" "$BACKEND_IMAGE" "$FRONTEND_IMAGE"; do
        gcloud artifacts docker images describe "$image"
      done

      gcloud run compose up ./aspire-output/docker-compose.yaml \
        --dry-run \
        --no-build \
        --allow-unauthenticated \
        --region us-central1 \
        --project thethinker

      gcloud run compose up ./aspire-output/docker-compose.yaml \
        --no-build \
        --allow-unauthenticated \
        --region us-central1 \
        --project thethinker
  only:
    - tags
