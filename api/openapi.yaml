openapi: 3.0.3
info:
  title: TheThinker API
  description: AI-powered outfit recommendation backend — Scan · Schedule · Style
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Registration and login
  - name: users
    description: User profile and style preferences
  - name: wardrobe
    description: Clothing catalog and AI scan
  - name: calendar
    description: Google / Apple Calendar integration
  - name: recommendations
    description: Daily outfit suggestions

paths:

  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Users ───────────────────────────────────────────────────────────────────

  /users/me/preferences:
    get:
      tags: [users]
      summary: Get the authenticated user's style preferences (personalized Q answers)
      responses:
        '200':
          description: User preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [users]
      summary: Update style preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Preferences'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/work-schedule:
    get:
      tags: [users]
      summary: Get the user's working schedule, working time, and holidays
      responses:
        '200':
          description: The user's work schedule (defaults are returned if unset)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkSchedule'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [users]
      summary: Set the working schedule, working time, and holidays
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkSchedule'
      responses:
        '200':
          description: Work schedule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkSchedule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Wardrobe ────────────────────────────────────────────────────────────────

  /wardrobe/items:
    get:
      tags: [wardrobe]
      summary: List all clothing items in the wardrobe (clothes status screen)
      parameters:
        - name: category
          in: query
          description: Filter by clothing category
          schema:
            type: string
            enum: [formal, casual, sport]
      responses:
        '200':
          description: List of clothing items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClothingItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [wardrobe]
      summary: Manually classify and add a clothing item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemRequest'
      responses:
        '201':
          description: Item added to wardrobe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClothingItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /wardrobe/items/{id}:
    put:
      tags: [wardrobe]
      summary: Update an existing clothing item's fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemRequest'
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClothingItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [wardrobe]
      summary: Delete a clothing item from the wardrobe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Item deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /wardrobe/items/{id}/image:
    post:
      tags: [wardrobe]
      summary: Upload an image for an existing clothing item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Photo of the clothing item (JPEG or PNG, max 10 MB)
      responses:
        '200':
          description: Image uploaded and URL updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClothingItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wardrobe/scan:
    post:
      tags: [wardrobe]
      summary: Submit a photo for AI categorization and add to wardrobe
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Photo of the clothing item
      responses:
        '201':
          description: Item scanned and added to wardrobe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClothingItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /wardrobe/classify:
    post:
      tags: [wardrobe]
      summary: Classify a clothing image without saving to the wardrobe
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Photo of the clothing item
      responses:
        '200':
          description: AI classification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassifyResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Calendar ────────────────────────────────────────────────────────────────

  /calendar/connect:
    post:
      tags: [calendar]
      summary: Connect a Google or Apple Calendar via OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarConnectRequest'
      responses:
        '200':
          description: Calendar connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarConnection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /calendar/disconnect:
    delete:
      tags: [calendar]
      summary: Disconnect the linked calendar
      responses:
        '204':
          description: Calendar disconnected
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /calendars:
    get:
      tags: [calendar]
      summary: List the user's calendars
      responses:
        '200':
          description: The user's calendars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Calendar'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [calendar]
      summary: Add a calendar from an ICS URL
      description: >
        Fetches the ICS feed at the given URL, parses its events, and stores
        the calendar. Users may add one or more calendars.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCalendarRequest'
      responses:
        '201':
          description: Calendar added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Calendar'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          description: The ICS feed could not be fetched or parsed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calendars/{id}:
    delete:
      tags: [calendar]
      summary: Remove a calendar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Calendar removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /calendars/events:
    get:
      tags: [calendar]
      summary: List calendar events for a given day
      parameters:
        - name: date
          in: query
          description: Day to list events for (ISO 8601 date, defaults to today)
          schema:
            type: string
            format: date
            example: '2025-06-01'
      responses:
        '200':
          description: Events for the day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalendarEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /calendars/events/{id}/ignore:
    post:
      tags: [calendar]
      summary: Ignore an event so it is hidden and excluded from recommendations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Event ignored
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [calendar]
      summary: Stop ignoring a previously ignored event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Event un-ignored
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Recommendations ─────────────────────────────────────────────────────────

  /recommendations/outfit:
    get:
      tags: [recommendations]
      summary: Get an outfit recommendation for the given date
      parameters:
        - name: date
          in: query
          description: Date to recommend for (ISO 8601, defaults to today)
          schema:
            type: string
            format: date
            example: '2025-06-01'
        - name: session_id
          in: query
          description: Resume an existing AI recommendation session (regenerate). Omit to start a new session.
          schema:
            type: string
      responses:
        '200':
          description: Outfit recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitRecommendation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /recommendations/outfit/accept:
    post:
      tags: [recommendations]
      summary: Accept today's outfit and mark all items as worn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptOutfitRequest'
      responses:
        '204':
          description: Items marked as worn
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user_id]
      properties:
        token:
          type: string
          description: JWT Bearer token
        user_id:
          type: string

    Preferences:
      type: object
      properties:
        styles:
          type: array
          description: Preferred clothing styles
          items:
            type: string
            enum: [formal, casual, sport, streetwear, business_casual]
        answers:
          type: object
          description: Personalized Q answers keyed by question ID
          additionalProperties:
            type: string

    ClassifyResult:
      type: object
      required: [category, sub_type, color, fit, season, confidence_score]
      properties:
        category:
          type: string
          enum: [formal, casual, sport]
        sub_type:
          type: string
          example: jeans
        color:
          type: string
          example: navy blue
        fit:
          type: string
          enum: [slim, regular, relaxed, oversized]
        season:
          type: string
          enum: [all, spring_summer, autumn_winter, winter]
        confidence_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Overall AI confidence (0–1). Defaults to 0.85 if the AI service omits it.
          example: 0.85

    AddItemRequest:
      type: object
      required: [category, sub_type, color, fit, season]
      properties:
        category:
          type: string
          enum: [formal, casual, sport]
        sub_type:
          type: string
          example: jeans
        color:
          type: string
          example: navy blue
        fit:
          type: string
          enum: [slim, regular, relaxed, oversized]
        season:
          type: string
          enum: [all, spring_summer, autumn_winter, winter]
        image_url:
          type: string
          format: uri

    ClothingItem:
      type: object
      required: [id, category, sub_type, color]
      properties:
        id:
          type: string
        category:
          type: string
          enum: [formal, casual, sport]
        sub_type:
          type: string
          example: shirt
        color:
          type: string
          example: navy blue
        fit:
          type: string
          enum: [slim, regular, relaxed, oversized]
        season:
          type: string
          enum: [all, spring_summer, autumn_winter, winter]
        image_url:
          type: string
          format: uri
        last_worn:
          type: string
          format: date-time
          nullable: true

    CalendarConnectRequest:
      type: object
      required: [provider, auth_code]
      properties:
        provider:
          type: string
          enum: [google, apple]
        auth_code:
          type: string
          description: OAuth authorization code from the provider

    CalendarConnection:
      type: object
      required: [provider, connected_at]
      properties:
        provider:
          type: string
          enum: [google, apple]
        connected_at:
          type: string
          format: date-time

    AddCalendarRequest:
      type: object
      required: [name, ics_url]
      properties:
        name:
          type: string
          example: Work
        ics_url:
          type: string
          format: uri
          description: Public ICS feed URL for the calendar

    Calendar:
      type: object
      required: [id, name, source, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        source:
          type: string
          description: Where the calendar was imported from (e.g. the ICS URL)
        created_at:
          type: string
          format: date-time

    CalendarEvent:
      type: object
      required: [id, title, starts_at, all_day]
      properties:
        id:
          type: string
        title:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
        all_day:
          type: boolean

    WorkSchedule:
      type: object
      required: [working_days, work_start, work_end, holidays]
      properties:
        working_days:
          type: array
          description: Working weekdays as integers, 0 = Sunday … 6 = Saturday
          items:
            type: integer
            minimum: 0
            maximum: 6
          example: [1, 2, 3, 4, 5]
        work_start:
          type: string
          description: Start of the working day, "HH:MM" 24-hour
          example: '09:00'
        work_end:
          type: string
          description: End of the working day, "HH:MM" 24-hour
          example: '17:00'
        holidays:
          type: array
          description: Days off as ISO 8601 dates, even on a working weekday
          items:
            type: string
            format: date
          example: ['2025-12-25']

    AcceptOutfitRequest:
      type: object
      required: [item_ids, session_id]
      properties:
        item_ids:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
        session_id:
          type: string
          description: AI session ID returned by GET /recommendations/outfit

    OutfitRecommendation:
      type: object
      required: [session_id, date, items]
      properties:
        session_id:
          type: string
          description: AI session ID — pass back as ?session_id= on refresh or in accept body
        date:
          type: string
          format: date
        occasion:
          type: string
          example: business meeting
        weather:
          $ref: '#/components/schemas/WeatherSnapshot'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClothingItem'

    WeatherSnapshot:
      type: object
      required: [temperature, feels_like, description]
      properties:
        temperature:
          type: number
          description: Temperature in Celsius
        feels_like:
          type: number
        description:
          type: string
          example: partly cloudy
        location:
          type: string
          example: London

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Request is well-formed but semantically invalid (e.g., unrecognizable clothing image)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
