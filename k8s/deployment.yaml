apiVersion: apps/v1
kind: Deployment
metadata:
  name: thethinker-api
  labels:
    app: thethinker-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: thethinker-api
  template:
    metadata:
      labels:
        app: thethinker-api
      annotations:
        # TODO: enable Datadog APM injection via admission controller
        # admission.datadoghq.com/enabled: "true"
    spec:
      containers:
        - name: api
          # TODO: replace with real registry path
          image: registry.school-gitlab.xsolla.dev/team3/thethinker:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: thethinker-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: thethinker-secrets
                  key: database-url
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
