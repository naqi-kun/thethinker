services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thethinker
      POSTGRES_PASSWORD: thethinker
      POSTGRES_DB: thethinker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thethinker"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai:
    build: ./ai
    ports:
      - "8001:8001"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver

  gcs:
    image: fsouza/fake-gcs-server:1.49
    command: ["-scheme", "http", "-port", "4443", "-backend", "memory"]
    ports:
      - "4443:4443"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://thethinker:thethinker@db:5432/thethinker?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      AI_SERVICE_URL: http://ai:8001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: thethinker-api
      GCS_BUCKET: ${GCS_BUCKET:-wardrobe-images}
      GCS_EMULATOR_HOST: ${GCS_EMULATOR_HOST:-gcs:4443}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started
      jaeger:
        condition: service_started
      gcs:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
